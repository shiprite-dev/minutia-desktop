name: Release

# Builds a Developer ID signed, notarized, stapled DMG and publishes it with a Sparkle appcast
# on every v* tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
#
# Required repository secrets (the pipeline fails loudly at the preflight step if any is missing):
#   DEVELOPER_ID_CERT_P12       base64 of the Developer ID Application .p12 (cert + private key)
#   DEVELOPER_ID_CERT_PASSWORD  password protecting that .p12
#   DEVELOPMENT_TEAM            10-character Apple Developer Team ID
#   ASC_KEY_ID                 App Store Connect API key id (for notarytool)
#   ASC_ISSUER_ID              App Store Connect API issuer id
#   ASC_KEY_P8                 base64 of the App Store Connect API key .p8
#   SPARKLE_PRIVATE_KEY        Sparkle EdDSA private key (output of generate_keys), used by sign_update
#
# The public half of the Sparkle key must also be set as SUPublicEDKey in project.yml before the
# first release (see README "Releasing (maintainers)").

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SPARKLE_VERSION: "2.9.0"

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - required secrets present
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in DEVELOPER_ID_CERT_P12 DEVELOPER_ID_CERT_PASSWORD DEVELOPMENT_TEAM \
                      ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8 SPARKLE_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Resolve version from tag
        id: version
        run: |
          set -euo pipefail
          SHORT="${GITHUB_REF_NAME#v}"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Generate Xcode project
        run: make gen

      - name: Archive (Developer ID, hardened runtime)
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          SHORT_VERSION: ${{ steps.version.outputs.short }}
          BUILD_VERSION: ${{ steps.version.outputs.build }}
        run: |
          set -euo pipefail
          xcodebuild -project Minutia.xcodeproj -scheme Minutia -configuration Release \
            -derivedDataPath build -archivePath build/Minutia.xcarchive archive \
            MARKETING_VERSION="$SHORT_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_VERSION" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Export archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          sed "s/DEVELOPMENT_TEAM/$DEVELOPMENT_TEAM/" scripts/ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild -exportArchive -archivePath build/Minutia.xcarchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" -exportPath build/export

      # Sign nested Sparkle code innermost-first, then the framework, then the outer app LAST.
      # Never `codesign --deep`: it re-signs the XPC services and helpers with the wrong flags and
      # breaks their signatures. Downloader.xpc keeps its own entitlements (--preserve-metadata).
      - name: Sign Sparkle helpers and app
        run: |
          set -euo pipefail
          APP="build/export/Minutia.app"
          IDENTITY="Developer ID Application"
          FRAMEWORK="$APP/Contents/Frameworks/Sparkle.framework"
          FW_VERSION="$FRAMEWORK/Versions/Current"

          if [ -d "$FW_VERSION/XPCServices" ]; then
            find "$FW_VERSION/XPCServices" -maxdepth 1 -name "*.xpc" -print0 | while IFS= read -r -d '' xpc; do
              if [ "$(basename "$xpc")" = "Downloader.xpc" ]; then
                codesign -f -o runtime --timestamp --preserve-metadata=entitlements -s "$IDENTITY" "$xpc"
              else
                codesign -f -o runtime --timestamp -s "$IDENTITY" "$xpc"
              fi
            done
          fi

          for helper in "$FW_VERSION/Autoupdate" "$FW_VERSION/Updater.app"; do
            [ -e "$helper" ] && codesign -f -o runtime --timestamp -s "$IDENTITY" "$helper"
          done

          codesign -f -o runtime --timestamp -s "$IDENTITY" "$FRAMEWORK"
          codesign -f -o runtime --timestamp --entitlements Minutia/Minutia.entitlements -s "$IDENTITY" "$APP"

      - name: Notarize and staple
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -euo pipefail
          APP="build/export/Minutia.app"
          echo "$ASC_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/Minutia.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Minutia.zip" --wait \
            --key "$RUNNER_TEMP/asc.p8" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID"
          xcrun stapler staple "$APP"
          rm -f "$RUNNER_TEMP/asc.p8"

      - name: Package DMG
        env:
          SHORT_VERSION: ${{ steps.version.outputs.short }}
        run: |
          set -euo pipefail
          APP="build/export/Minutia.app"
          DMG="build/Minutia-${SHORT_VERSION}.dmg"
          STAGE="build/dmg-stage"
          rm -rf "$STAGE" "$DMG"; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          create-dmg \
            --volname "Minutia" \
            --window-size 600 400 \
            --icon "Minutia.app" 150 190 \
            --app-drop-link 450 190 \
            "$DMG" "$STAGE" || true
          test -f "$DMG"
          xcrun stapler staple "$DMG" || true

      - name: Verify signature and notarization
        env:
          SHORT_VERSION: ${{ steps.version.outputs.short }}
        run: |
          set -euo pipefail
          APP="build/export/Minutia.app"
          DMG="build/Minutia-${SHORT_VERSION}.dmg"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl -a -vvv "$APP"
          spctl -a -vvv --type install "$DMG"

      - name: Sign update and build appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SHORT_VERSION: ${{ steps.version.outputs.short }}
          BUILD_VERSION: ${{ steps.version.outputs.build }}
        run: |
          set -euo pipefail
          DMG="build/Minutia-${SHORT_VERSION}.dmg"
          DMG_NAME="$(basename "$DMG")"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          SIGN="$(echo "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/sparkle/bin/sign_update" --ed-key-file - "$DMG")"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"
          PUBDATE="$(date -R)"
          cat > build/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Minutia</title>
              <item>
                <title>${SHORT_VERSION}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:minimumSystemVersion>14.4</sparkle:minimumSystemVersion>
                <enclosure url="${URL}" sparkle:version="${BUILD_VERSION}" sparkle:shortVersionString="${SHORT_VERSION}" type="application/octet-stream" ${SIGN} />
              </item>
            </channel>
          </rss>
          EOF

      - name: Upload DMG and appcast to release
        env:
          GH_TOKEN: ${{ github.token }}
          SHORT_VERSION: ${{ steps.version.outputs.short }}
        run: |
          set -euo pipefail
          DMG="build/Minutia-${SHORT_VERSION}.dmg"
          gh release upload "${GITHUB_REF_NAME}" "$DMG" build/appcast.xml --clobber
